spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10



# Routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=admin-service
spring.cloud.gateway.routes[1].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.routes[4].id=wishlist-service
spring.cloud.gateway.routes[4].uri=lb://WISHLIST-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/wishlist/**

spring.cloud.gateway.routes[5].id=customer-service
spring.cloud.gateway.routes[5].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.routes[6].id=order-service
spring.cloud.gateway.routes[6].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[7].id=feedback-service
spring.cloud.gateway.routes[7].uri=lb://FEEDBACK-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/feedback/**

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

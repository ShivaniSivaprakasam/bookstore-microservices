spring:
  application:
    name: customer-service

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/bookstore_customer
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:myBookstoreSecretKey12345678901234567890}
  expiry: ${JWT_EXPIRY:86400000}

logging:
  level:
    com.bookstore: DEBUG